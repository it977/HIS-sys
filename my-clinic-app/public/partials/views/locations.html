<div id="view-locations" style="display:none;">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-3" style="border-bottom:2px solid var(--border-color);">
    <div>
      <h3 class="fw-bold m-0 text-dark"><i class="fas fa-map-marked-alt text-primary me-2"></i>ຕັ້ງຄ່າເມືອງ ແລະ ແຂວງ (Locations)</h3>
      <p class="text-muted mb-0 mt-1" style="font-size:11.5px;">ຂໍ້ມູນເມືອງ ແລະ ແຂວງທົ່ວລາວ</p>
    </div>
    <div>
      <button class="btn btn-danger shadow-sm fw-bold me-2" onclick="window.bulkDelete('locations')"><i class="fas fa-trash-alt me-1"></i> ລຶບລາຍການທີ່ເລືອກ</button>
      <input type="file" id="locExcelInput" accept=".xlsx, .xls, .csv" style="display: none;" onchange="window.handleLocationExcelUpload(event)">
      <button class="btn btn-success shadow-sm fw-bold me-2" onclick="document.getElementById('locExcelInput').click()"><i class="fas fa-file-excel me-1"></i> ອັບໂຫຼດ Excel</button>
      <button class="btn btn-primary shadow-sm fw-bold" onclick="window.openAddLocationModal()"><i class="fas fa-plus me-1"></i> ເພີ່ມເມືອງໃໝ່</button>
    </div>
  </div>
  <div class="card card-outline card-primary">
    <div class="card-body table-responsive">
      <table id="locationTable" class="table table-hover align-middle w-100">
        <thead class="bg-light">
          <tr>
            <th class="text-center" style="width: 40px;"><input type="checkbox" class="form-check-input" onchange="window.toggleAllCheckboxes(this, 'locations')"></th>
            <th>ເມືອງ (District)</th><th>ແຂວງ (Province)</th><th class="text-center">ຈັດການ</th>
          </tr>
        </thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
