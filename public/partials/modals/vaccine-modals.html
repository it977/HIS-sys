<!-- Patient Vaccine Modal -->
<div class="modal fade" id="patientVacModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-lg">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title fw-bold"><i class="fas fa-syringe me-2"></i>ບັນທຶກການສັກວັກຊີນ</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="patientVacForm" onsubmit="window.submitPatientVacForm(event)">
          <input type="hidden" id="pv_patient_id">
          <input type="hidden" id="pv_patient_name">
          <div class="mb-3">
            <label class="form-label fw-bold required">ຄົນເຈັບ</label>
            <select class="form-select" id="pv_patient" style="width:100%;"><option value="">-- ຄົ້ນຫາ ແລະ ເລືອກຄົນເຈັບ --</option></select>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold required">ວັກຊີນ</label>
              <select class="form-select" id="pv_vaccine" onchange="window.calculateNextVacDate()"><option value="">-- ເລືອກວັກຊີນ --</option></select>
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold required">ໂດສທີ</label>
              <input type="number" class="form-control" id="pv_dose" min="1" value="1" required oninput="window.calculateNextVacDate()">
            </div>
            <div class="col-md-3">
              <label class="form-label fw-bold">ເລກ Lot</label>
              <input type="text" class="form-control" id="pv_lot" placeholder="LOT-XXX">
            </div>
          </div>
          <div class="row g-3 mb-3">
            <div class="col-md-6">
              <label class="form-label fw-bold required">ວັນທີສັກ</label>
              <input type="date" class="form-control" id="pv_date" required onchange="window.calculateNextVacDate()">
            </div>
            <div class="col-md-6">
              <label class="form-label fw-bold">ແພດ / ພະຍາບານ</label>
              <select class="form-select dyn-Doctor" id="pv_doctor"><option value="">-- ເລືອກ --</option></select>
            </div>
          </div>
          <div class="card border-info bg-info bg-opacity-10 mb-4">
            <div class="card-body py-3 px-3">
              <div class="row g-3 align-items-center">
                <div class="col-md-8">
                  <label class="form-label fw-bold text-info mb-1"><i class="fas fa-calendar-alt me-1"></i>ວັນທີສັກຄັ້ງຕໍ່ໄປ (ຄຳນວນອັດຕະໂນມັດ)</label>
                  <input type="date" class="form-control border-info" id="pv_next_date" disabled>
                </div>
                <div class="col-md-4 pt-3">
                  <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="pv_auto_appt" disabled checked>
                    <label class="form-check-label fw-bold text-info small" for="pv_auto_appt">ສ້າງ Appointment ອັດຕະໂນມັດ</label>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <button type="submit" class="btn btn-success w-100 fw-bold py-2 shadow-sm"><i class="fas fa-save me-2"></i>ບັນທຶກການສັກວັກຊີນ</button>
        </form>
      </div>
    </div>
  </div>
</div>

<!-- Vaccine Master Modal -->
<div class="modal fade" id="vacMasterModal" tabindex="-1" data-bs-backdrop="static">
  <div class="modal-dialog modal-md">
    <div class="modal-content border-0 shadow">
      <div class="modal-header bg-success text-white">
        <h5 class="modal-title fw-bold"><i class="fas fa-vial me-2"></i>ຈັດການ Master ວັກຊີນ</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="vacMasterForm" onsubmit="window.submitVacMasterForm(event)">
          <input type="hidden" id="v_id">
          <div class="mb-3"><label class="form-label fw-bold required">ຊື່ວັກຊີນ</label><input type="text" class="form-control" id="v_name" required placeholder="ຕົວຢ່າງ: Hepatitis B"></div>
          <div class="mb-3"><label class="form-label fw-bold required">ພະຍາດທີ່ປ້ອງກັນ</label><input type="text" class="form-control" id="v_disease" required placeholder="ຕົວຢ່າງ: ໄວຮັດຕັບອັກເສບ B"></div>
          <div class="mb-3"><label class="form-label fw-bold required">ຈຳນວນໂດສທັງໝົດ</label><input type="number" class="form-control" id="v_doses" min="1" max="10" value="1" required oninput="window.generateIntervalInputs()"></div>
          <input type="hidden" id="v_interval_hidden">
          <div id="intervalInputsContainer" class="row g-2 mb-3" style="display:none;"></div>
          <button type="submit" class="btn btn-success w-100 fw-bold"><i class="fas fa-save me-2"></i>ບັນທຶກ</button>
        </form>
      </div>
    </div>
  </div>
</div>
