<div id="view-orgs" style="display:none;">
  <div class="d-flex justify-content-between align-items-center mb-4 pb-3" style="border-bottom:2px solid var(--border-color);">
    <div>
      <h3 class="fw-bold m-0 text-dark"><i class="fas fa-building text-primary me-2"></i>ລູກຄ້າອົງກອນ</h3>
      <p class="text-muted mb-0 mt-1" style="font-size:11.5px;">ອົງກອນ, ບໍລິສັດ ແລະ ປະກັນໄພ</p>
    </div>
    <div>
      <button class="btn btn-danger shadow-sm fw-bold me-2" onclick="window.bulkDelete('orgs')"><i class="fas fa-trash-alt me-1"></i> ລຶບລາຍການທີ່ເລືອກ</button>
      <input type="file" id="orgExcelInput" accept=".xlsx, .xls, .csv" style="display: none;" onchange="window.handleOrgExcelUpload(event)">
      <button class="btn btn-success shadow-sm fw-bold me-2" onclick="document.getElementById('orgExcelInput').click()"><i class="fas fa-file-excel me-1"></i> ອັບໂຫຼດ Excel</button>
      <button class="btn btn-primary shadow-sm" data-bs-toggle="modal" data-bs-target="#orgModal"
        onclick="document.getElementById('orgForm').reset(); document.getElementById('o_rowIdx').value='';"><i class="fas fa-plus me-1"></i> ເພີ່ມອົງກອນ</button>
    </div>
  </div>
  <div class="card">
    <div class="card-body table-responsive p-0">
      <table id="orgTable" class="table table-hover align-middle mb-0">
        <thead class="bg-light text-dark">
          <tr>
            <th class="text-center" style="width: 40px;"><input type="checkbox" class="form-check-input" onchange="window.toggleAllCheckboxes(this, 'orgs')"></th>
            <th>Org Code</th><th>Customer ID</th><th>ຊື່ຜູ້ຕິດຕໍ່</th>
            <th>ຊື່ອົງກອນ</th><th>ສ່ວນຫຼຸດ</th><th>ສະຖານະ</th><th class="text-center">ຈັດການ</th>
          </tr>
        </thead>
        <tbody id="orgTableBody"></tbody>
      </table>
    </div>
  </div>
</div>
