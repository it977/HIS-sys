<div id="view-settings" style="display:none;">
  <div class="mb-4">
    <h3 class="fw-bold m-0 text-dark"><i class="fas fa-cogs text-secondary me-2"></i>ຕັ້ງຄ່າຂໍ້ມູນພື້ນຖານ</h3>
    <p class="text-muted mb-0 mt-1" style="font-size:11.5px;">ຈັດການຂໍ້ມູນ Master ແລະ ລາຍື່ຕ່າງໆ</p>
  </div>

  <!-- Main Tabs -->
  <ul class="nav nav-tabs mb-4" id="settingsTabs" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="nav-link active" id="master-tab" data-bs-toggle="tab" data-bs-target="#master" type="button"><i class="fas fa-database me-2"></i>📋 ຂໍ້ມູນ Master</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="services-tab" data-bs-toggle="tab" data-bs-target="#services" type="button"><i class="fas fa-concierge-bell me-2"></i>🛎️ ບໍລິການ</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="locations-tab" data-bs-toggle="tab" data-bs-target="#locations" type="button"><i class="fas fa-map-marker-alt me-2"></i>📍 ທີ່ຢູ່</button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="nav-link" id="orgs-tab" data-bs-toggle="tab" data-bs-target="#orgs" type="button"><i class="fas fa-building me-2"></i>🏢 ົງກອນ</button>
    </li>
  </ul>

  <div class="tab-content" id="settingsTabContent">
    <!-- Master Data -->
    <div class="tab-pane fade show active" id="master" role="tabpanel">
      <div class="card card-outline card-success">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0"><i class="fas fa-list-alt me-2"></i>ຈັດການຂໍ້ມູນ Master</h5>
        </div>
        <div class="card-body bg-light">
          <div class="row">
            <div class="col-md-4 mb-3">
              <label class="form-label fw-bold">ເລືອກໝວດໝູ່:</label>
              <select class="form-select form-select-lg border-success fw-bold shadow-sm" id="masterCategory" onchange="window.loadMasterList()">
                <option value="">-- ເລອກໝວດໝູ່ --</option>
                <optgroup label="🏥 ຫ້ອງກວດ">
                  <option value="Department">ຫ້ອງກວດ (Department)</option>
                  <option value="Doctor">ລາຍຊື່ແພດ (Doctor)</option>
                </optgroup>
                <optgroup label="👥 ຄົນເຈັບ">
                  <option value="Title">ຄຳນຳໜ້າ (Title)</option>
                  <option value="Gender">ເພດ (Gender)</option>
                  <option value="Nationality">ສັນຊາດ (Nationality)</option>
                  <option value="Occupation">ອາຊີບ (Occupation)</option>
                  <option value="BloodType">ໝວດເລືອດ (Blood Type)</option>
                </optgroup>
                <optgroup label="🏢 ອົງກອນ">
                  <option value="InsCompany">ບໍລິສັດປະກັນໄພ</option>
                  <option value="Channel">ຊ່ອງທາງຮູ້ຈັກ</option>
                </optgroup>
                <optgroup label="📍 ສະຖານທີ່">
                  <option value="Site">ສະຖານທີ່ (Site)</option>
                  <option value="PatientType_InSite">ປະເພດຄົນເຈັບ (In-site)</option>
                  <option value="PatientType_Onsite">ປະເພດຄົນເຈັບ (On-site)</option>
                </optgroup>
                <optgroup label="💊 ຢາ">
                  <option value="DrugUnit">ຫົວໜ່ວຍຢາ (Drug Unit)</option>
                  <option value="DrugUsage">ວິທີກິນ/ໃຊ້ (Drug Usage)</option>
                </optgroup>
                <optgroup label="⏰ ອື່ນ">
                  <option value="Shift">ກະເວນ (Shift)</option>
                </optgroup>
              </select>
            </div>
            <div class="col-md-8 mb-3">
              <label class="form-label fw-bold">ເພີ່ມຂໍ້ມູນໃໝ່:</label>
              <div class="input-group input-group-lg shadow-sm">
                <input type="text" id="newMasterVal" class="form-control" placeholder="ພິມຂໍ້ມູນໃ່ທີ່ຕ້ອງການເພີ່ມ...">
                <button class="btn btn-success fw-bold px-4" onclick="window.addMaster()"><i class="fas fa-plus me-1"></i> ເພີ່ມ</button>
                <button class="btn btn-outline-secondary fw-bold px-3" onclick="window.resetMasterDefaults()" title="ດຶງຂໍ້ມູນມາດຕະຖານຄືນໃໝ່"><i class="fas fa-sync-alt me-1"></i> Reset</button>
              </div>
            </div>
          </div>
          <ul class="list-group mt-2 shadow-sm" id="masterListUl"></ul>
        </div>
      </div>
    </div>

    <!-- Services -->
    <div class="tab-pane fade" id="services" role="tabpanel">
      <div class="card card-outline card-info">
        <div class="card-header bg-info text-white">
          <h5 class="mb-0"><i class="fas fa-concierge-bell me-2"></i>ຈັດການບໍລິການ</h5>
        </div>
        <div class="card-body">
          <div class="d-flex justify-content-between mb-3">
            <button class="btn btn-info text-white" onclick="window.openAddServiceModal()"><i class="fas fa-plus me-1"></i> ເພີ່ມບໍລິການ</button>
            <button class="btn btn-outline-danger" onclick="window.bulkDelete('services')"><i class="fas fa-trash me-1"></i> ລບທີ່ເລືອກ</button>
          </div>
          <div class="table-responsive">
            <table id="serviceTable" class="table table-hover">
              <thead>
                <tr>
                  <th><input type="checkbox" onchange="window.toggleAllCheckboxes(this, 'services')"></th>
                  <th>ຊື່ບໍລິການ</th>
                  <th>ແພດສະເພາະທາງ</th>
                  <th>ໝວດລາຍຮັບ</th>
                  <th class="text-center">ຈັດການ</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Locations -->
    <div class="tab-pane fade" id="locations" role="tabpanel">
      <div class="card card-outline card-warning">
        <div class="card-header bg-warning text-dark">
          <h5 class="mb-0"><i class="fas fa-map-marker-alt me-2"></i>ຈັດການທີ່ຢູ່ (ເມືອງ-ແຂວງ)</h5>
        </div>
        <div class="card-body">
          <div class="d-flex justify-content-between mb-3">
            <button class="btn btn-warning text-dark" onclick="window.openAddLocationModal()"><i class="fas fa-plus me-1"></i> ເພີ່ມທີ່ຢູ່</button>
            <button class="btn btn-outline-danger" onclick="window.bulkDelete('locations')"><i class="fas fa-trash me-1"></i> ລຶບທີ່ເລືອກ</button>
          </div>
          <div class="table-responsive">
            <table id="locationTable" class="table table-hover">
              <thead>
                <tr>
                  <th><input type="checkbox" onchange="window.toggleAllCheckboxes(this, 'locations')"></th>
                  <th>ເມືອງ</th>
                  <th>ແຂວງ</th>
                  <th class="text-center">ຈັດການ</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <!-- Organizations -->
    <div class="tab-pane fade" id="orgs" role="tabpanel">
      <div class="card card-outline card-secondary">
        <div class="card-header bg-secondary text-white">
          <h5 class="mb-0"><i class="fas fa-building me-2"></i>ຈັດການອົງກອນ/ປະກັນໄພ</h5>
        </div>
        <div class="card-body">
          <div class="d-flex justify-content-between mb-3">
            <button class="btn btn-secondary text-white" onclick="window.openOrgModal()"><i class="fas fa-plus me-1"></i> ເພີ່ມອົງກອນ</button>
            <button class="btn btn-outline-danger" onclick="window.bulkDelete('orgs')"><i class="fas fa-trash me-1"></i> ລຶບທີ່ເລືອກ</button>
          </div>
          <div class="table-responsive">
            <table id="orgTable" class="table table-hover">
              <thead>
                <tr>
                  <th><input type="checkbox" onchange="window.toggleAllCheckboxes(this, 'orgs')"></th>
                  <th>Org Code</th>
                  <th>ຊື່ອົງກອນ</th>
                  <th>ສ່ວນຫຼຸດ</th>
                  <th>ສະຖານະ</th>
                  <th class="text-center">ຈັດການ</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
