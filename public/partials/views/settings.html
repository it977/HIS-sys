<div id="view-settings" style="display:none;">
  <div class="mb-4">
    <h3 class="fw-bold m-0 text-dark"><i class="fas fa-list-alt text-success me-2"></i>ຈັດການຂໍ້ມູນ Master</h3>
    <p class="text-muted mb-0 mt-1" style="font-size:11.5px;">ຈັດການໝວດຂໍ້ມູນພື້ນຖານທີ່ໃຊ້ໃນລະບົບ</p>
  </div>
  <div class="card card-outline card-success">
    <div class="card-header bg-success text-white">
      <h5 class="mb-0"><i class="fas fa-list-alt me-2"></i>ຈັດການຂໍ້ມູນ Master</h5>
    </div>
    <div class="card-body bg-light master-admin-shell">
      <div class="master-topic-tabs" id="masterGroupTabs"></div>

      <div class="master-workspace-grid mt-3">
        <aside class="master-sidebar-card">
          <div class="master-sidebar-head">
            <span class="master-section-label">ກຸ່ມຍ່ອຍ</span>
            <h6>ເລືອກຫົວຂໍ້ທີ່ຕ້ອງການຈັດການ</h6>
          </div>
          <div class="master-category-list" id="masterCategoryButtons"></div>

          <select class="d-none" id="masterCategory" onchange="window.loadMasterList()">
            <option value="">-- ເລືອກໝວດໝູ່ --</option>
            <optgroup label="🏥 ຫ້ອງກວດ">
              <option value="Department">ຫ້ອງກວດ (Department)</option>
              <option value="Doctor">ລາຍຊື່ແພດ (Doctor)</option>
            </optgroup>
            <optgroup label="👥 ຄົນເຈັບ">
              <option value="Title">ຄຳນຳໜ້າ (Title)</option>
              <option value="Gender">ເພດ (Gender)</option>
              <option value="Nationality">ສັນຊາດ (Nationality)</option>
              <option value="Occupation">ອາຊີບ (Occupation)</option>
              <option value="BloodType">ໝວດເລືອດ (Blood Type)</option>
            </optgroup>
            <optgroup label="🏢 ອົງກອນ">
              <option value="InsCompany">ບໍລິສັດປະກັນໄພ</option>
              <option value="Channel">ຊ່ອງທາງຮູ້ຈັກ</option>
            </optgroup>
            <optgroup label="📍 ສະຖານທີ່">
              <option value="Site">ສະຖານທີ່ (Site)</option>
              <option value="PatientType_InSite">ປະເພດຄົນເຈັບ (In-site)</option>
              <option value="PatientType_Onsite">ປະເພດຄົນເຈັບ (On-site)</option>
            </optgroup>
            <optgroup label="💊 ຢາ">
              <option value="DrugUnit">ຫົວໜ່ວຍຢາ (Drug Unit)</option>
              <option value="DrugUsage">ວິທີກິນ/ໃຊ້ (Drug Usage)</option>
            </optgroup>
            <optgroup label="⏰ ອື່ນໆ">
              <option value="Shift">ກະເວນ (Shift)</option>
            </optgroup>
          </select>
        </aside>

        <section class="master-detail-card">
          <div class="master-detail-head">
            <div>
              <span class="master-section-label">ຫົວຂໍ້ທີ່ເລືອກ</span>
              <h4 id="masterActiveCategoryName">ເລືອກໝວດຂໍ້ມູນ</h4>
              <p id="masterActiveCategoryDesc">ເລືອກ category ຈາກແຖບດ້ານຊ້າຍເພື່ອເລີ່ມຈັດການຂໍ້ມູນ</p>
            </div>
            <div class="master-count-pill"><span id="masterItemCount">0</span> ລາຍການ</div>
          </div>

          <div class="master-entry-toolbar">
            <div class="master-entry-inputs">
              <label class="form-label fw-bold mb-2">ເພີ່ມຂໍ້ມູນໃໝ່</label>
              <div class="input-group input-group-lg shadow-sm">
                <input type="text" id="newMasterVal" class="form-control" placeholder="ພິມຂໍ້ມູນໃໝ່ທີ່ຕ້ອງການເພີ່ມ...">
                <button class="btn btn-success fw-bold px-4" onclick="window.addMaster()"><i class="fas fa-plus me-1"></i> ເພີ່ມ</button>
                <button class="btn btn-outline-secondary fw-bold px-3" onclick="window.resetMasterDefaults()" title="ດຶງຂໍ້ມູນມາດຕະຖານຄືນໃໝ່"><i class="fas fa-sync-alt me-1"></i> Reset</button>
              </div>
            </div>
          </div>

          <ul class="list-group mt-3 shadow-sm master-list-panel" id="masterListUl"></ul>
        </section>
      </div>
    </div>
  </div>
</div>
