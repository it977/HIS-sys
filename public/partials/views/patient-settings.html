<div id="view-patient-settings" style="display:none;">
  <div class="mb-4">
    <h3 class="fw-bold m-0 text-dark"><i class="fas fa-user-injured text-primary me-2"></i>ຕັ້ງຄ່າລົງທະບຽນຄົນເຈັບ</h3>
    <p class="text-muted mb-0 mt-1" style="font-size:11.5px;">ກຳນົດຄ່າຕ່າງໆສຳລັບການລົງທະບຽນຄົນເຈັບ</p>
  </div>

  <div class="row g-4">
    <!-- ຂໍ້ມູນສ່ວນຕົວ -->
    <div class="col-md-6">
      <div class="card card-outline card-primary h-100">
        <div class="card-header bg-primary text-white">
          <h5 class="mb-0"><i class="fas fa-user me-2"></i>ຂໍ້ມູນສ່ວນຕົວ</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">📝 ຄຳນຳໜ້າ (Title)</label>
              <button class="btn btn-sm btn-outline-primary" onclick="window.openMasterModal('Title')"><i class="fas fa-plus"></i></button>
            </div>
            <select class="form-select" id="patientTitle" multiple size="4">
              <option>ທ່ານ</option>
              <option>ທ່ານນາງ</option>
              <option>ດ.ຊ.</option>
              <option>ດ.ຍ.</option>
              <option>ອື່ນໆ</option>
            </select>
            <small class="text-muted">ກົດ Ctrl + Click ເພື່ອເລືອກຫຼາຍຕົວ</small>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">👥 ເພດ (Gender)</label>
              <button class="btn btn-sm btn-outline-primary" onclick="window.openMasterModal('Gender')"><i class="fas fa-plus"></i></button>
            </div>
            <select class="form-select" id="patientGender" multiple size="3">
              <option>ຊາຍ</option>
              <option>ຍິງ</option>
              <option>ອື່ນໆ</option>
            </select>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">🩸 ວດເລືອດ (Blood Type)</label>
              <button class="btn btn-sm btn-outline-primary" onclick="window.openMasterModal('BloodType')"><i class="fas fa-plus"></i></button>
            </div>
            <select class="form-select" id="patientBloodType" multiple size="5">
              <option>A</option>
              <option>B</option>
              <option>AB</option>
              <option>O</option>
              <option>ບໍ່ຮູ້</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- ທີ່ຢູ່ -->
    <div class="col-md-6">
      <div class="card card-outline card-success h-100">
        <div class="card-header bg-success text-white">
          <h5 class="mb-0"><i class="fas fa-map-marker-alt me-2"></i>ທີ່ຢູ່</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">🏙️ ຂວງ (Province)</label>
              <button class="btn btn-sm btn-outline-success" onclick="window.loadView('locations')"><i class="fas fa-edit"></i></button>
            </div>
            <select class="form-select" id="patientProvince" size="5">
              <option>ວຽງຈັນ</option>
              <option>ຈຳປາສັກ</option>
              <option>ຫຼວງພະບາງ</option>
              <option>ສະຫວັນນະເຂດ</option>
              <option>ຄຳມ່ວນ</option>
            </select>
            <small class="text-muted">ກົດປຸ່ມ edit ເພື່ອຈັດການ</small>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">🏘️ ເມືອງ (District)</label>
              <button class="btn btn-sm btn-outline-success" onclick="window.loadView('locations')"><i class="fas fa-edit"></i></button>
            </div>
            <select class="form-select" id="patientDistrict" size="5">
              <option>ໄເສດຖາ</option>
              <option>ຈັນທະບູລີ</option>
              <option>ສີສັດຕະນາກ</option>
              <option>ຫາດຊາຍຟອງ</option>
              <option>ປາກງື່ມ</option>
            </select>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ສັນຊາດ, ອາຊີບ, ກະເວນ -->
  <div class="row g-4 mt-2">
    <!-- ສັນາດ ແລະ ອາຊີບ -->
    <div class="col-md-6">
      <div class="card card-outline card-info h-100">
        <div class="card-header bg-info text-white">
          <h5 class="mb-0"><i class="fas fa-globe me-2"></i>ສັນຊາດ ແລະ ອາຊີບ</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">🌍 ສັນຊາດ (Nationality)</label>
              <button class="btn btn-sm btn-outline-info" onclick="window.openMasterModal('Nationality')"><i class="fas fa-plus"></i></button>
            </div>
            <select class="form-select" id="patientNationality" multiple size="4">
              <option>ລາວ</option>
              <option>ໄທ</option>
              <option>ຫວຽດນາມ</option>
              <option>ຈີນ</option>
              <option>ອື່ນ</option>
            </select>
          </div>

          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">💼 ອາຊີບ (Occupation)</label>
              <button class="btn btn-sm btn-outline-info" onclick="window.openMasterModal('Occupation')"><i class="fas fa-plus"></i></button>
            </div>
            <select class="form-select" id="patientOccupation" multiple size="5">
              <option>ພະນັກງານ</option>
              <option>ລັດຖະກອນ</option>
              <option>ຄ້າຂາຍ</option>
              <option>ກະສິກອນ</option>
              <option>ນັກຮຽນ/ນັກສຶກສາ</option>
              <option>ອື່ນໆ</option>
            </select>
          </div>
        </div>
      </div>
    </div>

    <!-- ກະເວນ -->
    <div class="col-md-6">
      <div class="card card-outline card-warning h-100">
        <div class="card-header bg-warning text-dark">
          <h5 class="mb-0"><i class="fas fa-clock me-2"></i>ກະເວນ</h5>
        </div>
        <div class="card-body">
          <div class="mb-3">
            <div class="d-flex justify-content-between align-items-center mb-2">
              <label class="form-label fw-bold mb-0">⏰ ກະເວນ (Shift)</label>
              <button class="btn btn-sm btn-outline-warning" onclick="window.openMasterModal('Shift')"><i class="fas fa-plus"></i></button>
            </div>
            <select class="form-select" id="patientShift" multiple size="4">
              <option>ເຊົ້າ (08:00-12:00)</option>
              <option>ບ່າຍ (13:00-16:00)</option>
              <option>ແລງ (16:00-20:00)</option>
              <option>ດື່ນ (20:00-08:00)</option>
            </select>
          </div>

          <div class="alert alert-warning mb-0">
            <i class="fas fa-info-circle me-2"></i>
            <strong>ໝາຍເຫດ:</strong> ກະເວນໃຊ້ສຳລັບແບ່ງຄິວຄົນເຈັບຕາມຊ່ວງເວລາ
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ປຸ່ມບັນທຶກ -->
  <div class="row mt-4">
    <div class="col-12">
      <div class="card card-outline card-secondary">
        <div class="card-body d-flex justify-content-between align-items-center">
          <div>
            <button class="btn btn-secondary" onclick="window.resetPatientSettings()"><i class="fas fa-undo me-2"></i>ຄ່າເລີ່ມຕົ້ນ</button>
          </div>
          <button class="btn btn-primary btn-lg" onclick="window.savePatientSettings()"><i class="fas fa-save me-2"></i>ບັນທຶກການຕັ້ງຄ່າ</button>
        </div>
      </div>
    </div>
  </div>
</div>
